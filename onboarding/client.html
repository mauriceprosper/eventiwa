<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Eventiwa — Start browsing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/theme.css">
<link rel="stylesheet" href="/assets/css/components.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<style>
body{background:var(--grad);min-height:100vh;display:grid;place-items:center;padding:20px}
.welcome-shell{background:#fff;border-radius:20px;box-shadow:0 30px 80px -20px rgba(11,10,31,.5);max-width:560px;width:100%;padding:60px 40px;text-align:center}
.welcome-icon{font-size:64px;margin-bottom:16px}
.welcome-shell h1{font-size:32px;margin-bottom:12px}
.welcome-shell p{color:var(--muted);font-size:15px;margin-bottom:32px;line-height:1.6}
.options{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.option-btn{padding:20px;border:2px solid var(--line);border-radius:14px;background:transparent;text-align:center;cursor:pointer;transition:.2s;font-family:inherit}
.option-btn:hover{border-color:var(--violet);background:var(--lilac)}
.option-btn .icon{font-size:36px;margin-bottom:8px}
.option-btn .label{font-weight:600;color:var(--ink);font-size:14px}
.btn{padding:12px 28px;border-radius:10px;font-family:inherit;font-weight:600;border:none;cursor:pointer;transition:.2s;font-size:14px}
.btn-primary{background:var(--grad);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(109,40,217,.3)}
@media(max-width:560px){
  .welcome-shell{padding:40px 24px}
  .welcome-shell h1{font-size:26px}
  .options{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="welcome-shell">
  <div class="welcome-icon">🎉</div>
  <h1>Welcome to Eventiwa!</h1>
  <p>You're all set. Now let's find the perfect vendors and venues for your next event.</p>

  <div class="options">
    <button class="option-btn" onclick="goTo('/halls/')">
      <div class="icon">🏛️</div>
      <div class="label">Browse halls</div>
    </button>
    <button class="option-btn" onclick="goTo('/storefront/')">
      <div class="icon">🏪</div>
      <div class="label">Find vendors</div>
    </button>
  </div>

  <button class="btn btn-primary" onclick="goTo('/halls/')">Start browsing</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAWKR_TsQupbmX1TPGgzuQRe9q0p7dcmuQ",
  authDomain: "eventiwa.firebaseapp.com",
  projectId: "eventiwa",
  storageBucket: "eventiwa.firebasestorage.app",
  messagingSenderId: "191301819852",
  appId: "1:191301819852:web:f51ccdf237182a8b449169"
};

let db, auth;

window.addEventListener("load", async () => {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();

    const params = new URLSearchParams(window.location.search);
    const uid = params.get("uid");

    if (uid) {
      // Update user record to mark onboarding complete
      await db.collection("users").doc(uid).update({
        onboardingComplete: true,
        updatedAt: new Date()
      });
    }
  } catch (err) {
    console.error("Init error:", err);
  }
});

function goTo(path) {
  window.location.href = path;
}
</script>
</body>
</html>
