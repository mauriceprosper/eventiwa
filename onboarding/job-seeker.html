<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete your job seeker profile — Eventiwa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/theme.css">
<link rel="stylesheet" href="/assets/css/components.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<style>
body{background:var(--mist);min-height:100vh;display:grid;place-items:center;padding:20px}
.onboard-shell{background:#fff;border-radius:20px;box-shadow:0 30px 80px -20px rgba(11,10,31,.5);max-width:620px;width:100%;padding:50px}
.progress-bar{height:4px;background:var(--line);border-radius:999px;margin-bottom:32px;overflow:hidden}
.progress-fill{height:100%;background:var(--grad);transition:width .3s}
.step-header{margin-bottom:32px}
.step-num{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:8px}
.step-header h1{font-size:28px;margin-bottom:8px}
.step-header p{color:var(--muted);font-size:15px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-weight:600;margin-bottom:8px;color:var(--ink);font-size:14px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;color:var(--ink)}
.form-group textarea{resize:vertical;min-height:100px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(109,40,217,.08)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.step{display:none}
.step.active{display:block}
.actions{display:flex;gap:12px;margin-top:32px}
.btn{padding:12px 20px;border-radius:10px;font-family:inherit;font-weight:600;border:none;cursor:pointer;transition:.2s;font-size:14px}
.btn-primary{background:var(--grad);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(109,40,217,.3)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--mist);color:var(--ink);border:1px solid var(--line)}
.btn-secondary:hover{background:var(--lilac)}
.error-msg{background:#fee2e2;color:#991b1b;padding:12px;border-radius:10px;margin-bottom:16px;font-size:14px;display:none}
.success-msg{background:#dbeafe;color:#1e40af;padding:12px;border-radius:10px;margin-bottom:16px;font-size:14px;display:none}
.checkbox-group{display:flex;flex-direction:column;gap:8px}
.checkbox-group label{display:flex;align-items:center;gap:8px;font-weight:400}
.checkbox-group input{width:auto;margin:0}
@media(max-width:560px){
  .onboard-shell{padding:32px 20px}
  .step-header h1{font-size:22px}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="onboard-shell">
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <!-- STEP 1: PROFESSIONAL INFO -->
  <div class="step active" id="step-1">
    <div class="step-header">
      <div class="step-num">Step 1 of 2</div>
      <h1>Tell us about your experience</h1>
      <p>Help brands find the right person for their team</p>
    </div>

    <form onsubmit="nextStep(event, 1)">
      <div class="form-group">
        <label>Professional skills / roles</label>
        <textarea id="skills" placeholder="e.g. Event coordination, decoration, catering management..." required></textarea>
      </div>
      <div class="form-group">
        <label>Years of experience</label>
        <select id="experience-years" required>
          <option value="">Select...</option>
          <option value="Fresh graduate">Fresh graduate (no experience)</option>
          <option value="1-2">1-2 years</option>
          <option value="2-5">2-5 years</option>
          <option value="5-10">5-10 years</option>
          <option value="10+">10+ years</option>
        </select>
      </div>
      <div class="form-group">
        <label>What type of roles are you interested in?</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="job-type" value="Full-time"> Full-time employment</label>
          <label><input type="checkbox" name="job-type" value="Part-time"> Part-time work</label>
          <label><input type="checkbox" name="job-type" value="Contract"> Contract/freelance projects</label>
        </div>
      </div>
      <div class="actions">
        <button type="button" class="btn btn-secondary" onclick="goBack()">Back</button>
        <button type="submit" class="btn btn-primary">Next</button>
      </div>
    </form>
  </div>

  <!-- STEP 2: LOCATION & CONTACT -->
  <div class="step" id="step-2">
    <div class="step-header">
      <div class="step-num">Step 2 of 2</div>
      <h1>Location & contact</h1>
      <p>How brands can reach you</p>
    </div>

    <form onsubmit="completeOnboarding(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Phone number</label>
          <input type="tel" id="phone" placeholder="+234 (0)..." required>
        </div>
        <div class="form-group">
          <label>State</label>
          <select id="state" required>
            <option value="">Select state...</option>
            <option value="Lagos">Lagos</option>
            <option value="Abuja">Abuja</option>
            <option value="Oyo">Oyo</option>
            <option value="Rivers">Rivers</option>
            <option value="Ogun">Ogun</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>LinkedIn profile (optional)</label>
        <input type="url" id="linkedin" placeholder="https://linkedin.com/in/yourprofile">
      </div>
      <div class="form-group">
        <label>Portfolio/CV link (optional)</label>
        <input type="url" id="portfolio" placeholder="Link to your portfolio or CV">
      </div>
      <div class="form-group">
        <label>Brief bio / professional summary</label>
        <textarea id="bio" placeholder="Tell brands about yourself and what you're looking for..." required></textarea>
      </div>
      <div class="actions">
        <button type="button" class="btn btn-secondary" onclick="prevStep()">Back</button>
        <button type="submit" class="btn btn-primary">Complete profile</button>
      </div>
    </form>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAWKR_TsQupbmX1TPGgzuQRe9q0p7dcmuQ",
  authDomain: "eventiwa.firebaseapp.com",
  projectId: "eventiwa",
  storageBucket: "eventiwa.firebasestorage.app",
  messagingSenderId: "191301819852",
  appId: "1:191301819852:web:f51ccdf237182a8b449169"
};

let db, auth, currentUser;
let currentStep = 1;
const totalSteps = 2;
let stepData = {};

window.addEventListener("load", async () => {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();

    const params = new URLSearchParams(window.location.search);
    const uid = params.get("uid");

    if (!uid) {
      window.location.href = "/auth/";
      return;
    }

    const user = await db.collection("users").doc(uid).get();
    if (!user.exists) {
      alert("User not found. Please sign up again.");
      window.location.href = "/auth/";
    }

    currentUser = uid;
    updateProgress();
  } catch (err) {
    console.error("Init error:", err);
  }
});

function updateProgress() {
  const progress = (currentStep / totalSteps) * 100;
  document.getElementById("progress").style.width = progress + "%";
}

function nextStep(e, step) {
  e.preventDefault();
  
  if (step === 1) {
    stepData.skills = document.getElementById("skills").value;
    stepData.experienceYears = document.getElementById("experience-years").value;
    const jobTypes = Array.from(document.querySelectorAll("input[name='job-type']:checked"))
      .map(el => el.value);
    if (jobTypes.length === 0) {
      alert("Please select at least one job type.");
      return;
    }
    stepData.jobTypes = jobTypes;
  }

  document.getElementById(`step-${currentStep}`).classList.remove("active");
  currentStep++;
  document.getElementById(`step-${currentStep}`).classList.add("active");
  updateProgress();
}

function prevStep() {
  document.getElementById(`step-${currentStep}`).classList.remove("active");
  currentStep--;
  document.getElementById(`step-${currentStep}`).classList.add("active");
  updateProgress();
}

function goBack() {
  window.location.href = "/auth/";
}

async function completeOnboarding(e) {
  e.preventDefault();
  clearMessages();

  const submitBtn = e.target.querySelector("button[type='submit']");
  submitBtn.disabled = true;

  stepData.phone = document.getElementById("phone").value;
  stepData.state = document.getElementById("state").value;
  stepData.linkedin = document.getElementById("linkedin").value;
  stepData.portfolio = document.getElementById("portfolio").value;
  stepData.bio = document.getElementById("bio").value;

  try {
    await db.collection("users").doc(currentUser).update({
      profile: {
        skills: stepData.skills,
        experienceYears: stepData.experienceYears,
        jobTypes: stepData.jobTypes,
        phone: stepData.phone,
        state: stepData.state,
        linkedin: stepData.linkedin,
        portfolio: stepData.portfolio,
        bio: stepData.bio
      },
      onboardingComplete: true,
      updatedAt: new Date()
    });

    showSuccess("Profile complete! Redirecting to job board...");
    setTimeout(() => {
      window.location.href = `/jobs/?ref=${currentUser}`;
    }, 1500);
  } catch (err) {
    showError(err.message || "Failed to save profile. Please try again.");
    submitBtn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg;
  el.style.display = "block";
}

function showSuccess(msg) {
  const el = document.getElementById("success-msg");
  el.textContent = msg;
  el.style.display = "block";
}

function clearMessages() {
  document.getElementById("error-msg").style.display = "none";
  document.getElementById("success-msg").style.display = "none";
}
</script>
</body>
</html>
