<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set up your vendor profile — Eventiwa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/theme.css">
<link rel="stylesheet" href="/assets/css/components.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<style>
body{background:var(--mist);min-height:100vh;display:grid;place-items:center;padding:20px}
.onboard-shell{background:#fff;border-radius:20px;box-shadow:0 30px 80px -20px rgba(11,10,31,.5);max-width:620px;width:100%;padding:50px}
.progress-bar{height:4px;background:var(--line);border-radius:999px;margin-bottom:32px;overflow:hidden}
.progress-fill{height:100%;background:var(--grad);transition:width .3s}
.step-header{margin-bottom:32px}
.step-num{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:8px}
.step-header h1{font-size:28px;margin-bottom:8px}
.step-header p{color:var(--muted);font-size:15px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-weight:600;margin-bottom:8px;color:var(--ink);font-size:14px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;color:var(--ink)}
.form-group textarea{resize:vertical;min-height:100px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(109,40,217,.08)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.step{display:none}
.step.active{display:block}
.actions{display:flex;gap:12px;margin-top:32px}
.btn{padding:12px 20px;border-radius:10px;font-family:inherit;font-weight:600;border:none;cursor:pointer;transition:.2s;font-size:14px}
.btn-primary{background:var(--grad);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(109,40,217,.3)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--mist);color:var(--ink);border:1px solid var(--line)}
.btn-secondary:hover{background:var(--lilac)}
.error-msg{background:#fee2e2;color:#991b1b;padding:12px;border-radius:10px;margin-bottom:16px;font-size:14px;display:none}
.success-msg{background:#dbeafe;color:#1e40af;padding:12px;border-radius:10px;margin-bottom:16px;font-size:14px;display:none}
@media(max-width:560px){
  .onboard-shell{padding:32px 20px}
  .step-header h1{font-size:22px}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="onboard-shell">
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <!-- STEP 1: BUSINESS DETAILS -->
  <div class="step active" id="step-1">
    <div class="step-header">
      <div class="step-num">Step 1 of 3</div>
      <h1>Tell us about your business</h1>
      <p>Help clients understand what you offer</p>
    </div>

    <form onsubmit="nextStep(event, 1)">
      <div class="form-group">
        <label>Business name</label>
        <input type="text" id="business-name" placeholder="e.g. Royal Dainties" required>
      </div>
      <div class="form-group">
        <label>Business category</label>
        <select id="business-category" required>
          <option value="">Select...</option>
          <option value="Event planners">Event planners</option>
          <option value="Decorators">Decorators</option>
          <option value="Rentals">Rentals</option>
          <option value="Florists">Florists</option>
          <option value="Media">Media & Photography</option>
          <option value="Lighting">Lighting & Sound</option>
          <option value="Catering">Catering</option>
          <option value="Transportation">Transportation</option>
        </select>
      </div>
      <div class="form-group">
        <label>Short description (what do you do?)</label>
        <textarea id="business-description" placeholder="e.g. We create stunning event decorations for weddings and corporate events..." required></textarea>
      </div>
      <div class="form-group">
        <label>Years in business</label>
        <select id="years-in-business" required>
          <option value="">Select...</option>
          <option value="Less than 1">Less than 1 year</option>
          <option value="1-3">1-3 years</option>
          <option value="3-5">3-5 years</option>
          <option value="5-10">5-10 years</option>
          <option value="10+">10+ years</option>
        </select>
      </div>
      <div class="actions">
        <button type="button" class="btn btn-secondary" onclick="goBack()">Back</button>
        <button type="submit" class="btn btn-primary">Next</button>
      </div>
    </form>
  </div>

  <!-- STEP 2: CONTACT & LOCATION -->
  <div class="step" id="step-2">
    <div class="step-header">
      <div class="step-num">Step 2 of 3</div>
      <h1>Contact & location</h1>
      <p>How clients can reach you</p>
    </div>

    <form onsubmit="nextStep(event, 2)">
      <div class="form-row">
        <div class="form-group">
          <label>Phone number</label>
          <input type="tel" id="phone" placeholder="+234 (0)..." required>
        </div>
        <div class="form-group">
          <label>State</label>
          <select id="state" required>
            <option value="">Select state...</option>
            <option value="Lagos">Lagos</option>
            <option value="Abuja">Abuja</option>
            <option value="Oyo">Oyo</option>
            <option value="Rivers">Rivers</option>
            <option value="Ogun">Ogun</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Service areas (which states do you serve?)</label>
        <input type="text" id="service-areas" placeholder="e.g. Lagos, Ogun, Abuja" required>
      </div>
      <div class="actions">
        <button type="button" class="btn btn-secondary" onclick="prevStep()">Back</button>
        <button type="submit" class="btn btn-primary">Next</button>
      </div>
    </form>
  </div>

  <!-- STEP 3: AVAILABILITY & PRICING -->
  <div class="step" id="step-3">
    <div class="step-header">
      <div class="step-num">Step 3 of 3</div>
      <h1>Availability & pricing</h1>
      <p>How you work with clients</p>
    </div>

    <form onsubmit="completeOnboarding(event)">
      <div class="form-group">
        <label>Minimum project budget (₦)</label>
        <input type="number" id="min-budget" placeholder="e.g. 50000" required>
      </div>
      <div class="form-group">
        <label>How do you typically charge?</label>
        <select id="pricing-model" required>
          <option value="">Select...</option>
          <option value="Per event">Per event (flat rate)</option>
          <option value="Hourly">Hourly rate</option>
          <option value="Percentage">Percentage of event budget</option>
          <option value="Flexible">Flexible/negotiate per project</option>
        </select>
      </div>
      <div class="form-group">
        <label>Average turnaround time (days)</label>
        <select id="turnaround" required>
          <option value="">Select...</option>
          <option value="1-7">1-7 days (rush orders)</option>
          <option value="1-2 weeks">1-2 weeks</option>
          <option value="2-4 weeks">2-4 weeks</option>
          <option value="1+ months">1+ months</option>
        </select>
      </div>
      <div class="form-group">
        <label>Availability</label>
        <select id="availability" required>
          <option value="">Select...</option>
          <option value="Always available">Always available</option>
          <option value="Weekends only">Weekends only</option>
          <option value="By appointment">By appointment</option>
          <option value="Seasonal">Seasonal</option>
        </select>
      </div>
      <div class="actions">
        <button type="button" class="btn btn-secondary" onclick="prevStep()">Back</button>
        <button type="submit" class="btn btn-primary">Complete setup</button>
      </div>
    </form>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAWKR_TsQupbmX1TPGgzuQRe9q0p7dcmuQ",
  authDomain: "eventiwa.firebaseapp.com",
  projectId: "eventiwa",
  storageBucket: "eventiwa.firebasestorage.app",
  messagingSenderId: "191301819852",
  appId: "1:191301819852:web:f51ccdf237182a8b449169"
};

let db, auth, currentUser;
let currentStep = 1;
const totalSteps = 3;
let stepData = {};

window.addEventListener("load", async () => {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();

    // Get UID from URL
    const params = new URLSearchParams(window.location.search);
    const uid = params.get("uid");

    if (!uid) {
      window.location.href = "/auth/";
      return;
    }

    // Verify user exists
    const user = await db.collection("users").doc(uid).get();
    if (!user.exists) {
      alert("User not found. Please sign up again.");
      window.location.href = "/auth/";
    }

    currentUser = uid;
    updateProgress();
  } catch (err) {
    console.error("Init error:", err);
  }
});

function updateProgress() {
  const progress = (currentStep / totalSteps) * 100;
  document.getElementById("progress").style.width = progress + "%";
}

function nextStep(e, step) {
  e.preventDefault();
  
  if (step === 1) {
    stepData.businessName = document.getElementById("business-name").value;
    stepData.businessCategory = document.getElementById("business-category").value;
    stepData.businessDescription = document.getElementById("business-description").value;
    stepData.yearsInBusiness = document.getElementById("years-in-business").value;
  } else if (step === 2) {
    stepData.phone = document.getElementById("phone").value;
    stepData.state = document.getElementById("state").value;
    stepData.serviceAreas = document.getElementById("service-areas").value;
  }

  document.getElementById(`step-${currentStep}`).classList.remove("active");
  currentStep++;
  document.getElementById(`step-${currentStep}`).classList.add("active");
  updateProgress();
}

function prevStep() {
  document.getElementById(`step-${currentStep}`).classList.remove("active");
  currentStep--;
  document.getElementById(`step-${currentStep}`).classList.add("active");
  updateProgress();
}

function goBack() {
  window.location.href = "/auth/";
}

async function completeOnboarding(e) {
  e.preventDefault();
  clearMessages();

  const submitBtn = e.target.querySelector("button[type='submit']");
  submitBtn.disabled = true;

  stepData.minBudget = Number(document.getElementById("min-budget").value);
  stepData.pricingModel = document.getElementById("pricing-model").value;
  stepData.turnaround = document.getElementById("turnaround").value;
  stepData.availability = document.getElementById("availability").value;

  try {
    // Update user profile in Firestore
    await db.collection("users").doc(currentUser).update({
      profile: {
        businessName: stepData.businessName,
        category: stepData.businessCategory,
        description: stepData.businessDescription,
        yearsInBusiness: stepData.yearsInBusiness,
        phone: stepData.phone,
        state: stepData.state,
        serviceAreas: stepData.serviceAreas.split(",").map(s => s.trim()),
        minBudget: stepData.minBudget,
        pricingModel: stepData.pricingModel,
        turnaround: stepData.turnaround,
        availability: stepData.availability
      },
      onboardingComplete: true,
      updatedAt: new Date()
    });

    // Also create a brand entry for visibility
    await db.collection("brands").add({
      name: stepData.businessName,
      type: stepData.businessCategory,
      state: stepData.state,
      tagline: stepData.businessDescription,
      vendorUid: currentUser,
      createdAt: new Date()
    });

    showSuccess("Setup complete! Redirecting to your dashboard...");
    setTimeout(() => {
      window.location.href = `/dashboard/vendor/?uid=${currentUser}`;
    }, 1500);
  } catch (err) {
    showError(err.message || "Failed to save profile. Please try again.");
    submitBtn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg;
  el.style.display = "block";
}

function showSuccess(msg) {
  const el = document.getElementById("success-msg");
  el.textContent = msg;
  el.style.display = "block";
}

function clearMessages() {
  document.getElementById("error-msg").style.display = "none";
  document.getElementById("success-msg").style.display = "none";
}
</script>
</body>
</html>
